<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubungi Kami - GreaseCycle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #335f4b; /* Warna hijau sesuai gambar */
            --text-dark: #1e293b;
            --bg-light: #f4f7f6;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: white;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary-green);
            text-decoration: none;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
            margin: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-green);
        }

        .nav-links a.active {
            font-weight: 700;
        }

        /* HERO HEADER (Sesuai Gambar) */
        .hero {
            background-color: var(--primary-green);
            color: white;
            text-align: center;
            padding: 80px 20px;
        }

        .hero h1 {
            font-size: 42px;
            margin: 0;
            font-weight: 700;
        }

        .hero p {
            margin-top: 15px;
            font-size: 18px;
            opacity: 0.9;
            font-weight: 300;
        }

        /* CONTAINER FORM */
        .wrapper {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .contact-container {
            display: flex;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            flex-wrap: wrap;
        }

        .form-section {
            flex: 1.5;
            padding: 40px;
        }

        .info-section {
            flex: 1;
            background: #f9fbfb;
            padding: 40px;
            border-left: 1px solid #eee;
        }

        /* FORM STYLING */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
        }

        button {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #264a3a;
        }

        .info-item {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .info-item i { color: var(--primary-green); font-size: 20px; }
        .info-item h4 { margin: 0; font-size: 16px; }
        .info-item p { margin: 5px 0 0; font-size: 14px; color: #666; }

        @media (max-width: 768px) {
            .contact-container { flex-direction: column; }
            nav { padding: 20px 5%; }
            .nav-links { display: none; } /* Sembunyikan menu di mobile untuk simpelnya */
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">Greasycycle</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">Tentang</a></li>
            <li><a href="contact.html" class="active">Kontak</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>Hubungi Kami</h1>
        <p>Ada pertanyaan mengenai layanan kami? Tim kami siap membantu Anda.</p>
    </header>

    <div class="wrapper">
        <div class="contact-container">
            <div class="form-section">
                <form id="contactForm">
                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <input type="text" placeholder="Masukkan nama Anda">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="email@contoh.com">
                    </div>
                    <div class="form-group">
                        <label>Pesan</label>
                        <textarea rows="5" placeholder="Tulis pesan Anda di sini..."></textarea>
                    </div>
                    <button type="submit">Kirim Pesan</button>
                </form>
            </div>

            <div class="info-section">
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>
                        <h4>Lokasi</h4>
                        <p>Jl. Semampir, Sukolilo, Surabaya</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <h4>Email</h4>
                        <p>info@greasecycle.id</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-phone"></i>
                    <div>
                        <h4>Telepon</h4>
                        <p>+62 812-3456-7890</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
